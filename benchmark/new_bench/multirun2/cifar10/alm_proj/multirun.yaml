hydra:
  run:
    dir: outputs/${task.name}/${algorithm.name}/${approach}/fold${fold}_init${init_seed}
  sweep:
    dir: multirun/${task.name}/${algorithm.name}
    subdir: ${approach}/fold${fold}_init${init_seed}/${hp_hash:${algorithm}}
  launcher:
    submitit_folder: ${hydra.sweep.dir}/.submitit/%j
    timeout_min: 60
    cpus_per_task: 4
    gpus_per_node: null
    tasks_per_node: 1
    mem_gb: null
    nodes: 1
    name: ${hydra.job.name}
    stderr_to_stdout: false
    _target_: hydra_plugins.hydra_submitit_launcher.submitit_launcher.SlurmLauncher
    partition: h200fast
    qos: null
    comment: null
    constraint: null
    exclude: null
    gres: null
    cpus_per_gpu: null
    gpus_per_task: null
    mem_per_gpu: null
    mem_per_cpu: 8G
    account: null
    signal_delay_s: 120
    max_num_timeout: 0
    additional_parameters:
      gres: gpu:1
    array_parallelism: 199
    setup: null
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params:
      algorithm.primal.lr: choice(0.001, 0.005, 0.01, 0.02, 0.05)
      algorithm.dual.lr: choice(0.01, 0.02, 0.05, 0.1, 0.5)
      algorithm.dual.penalty: choice(0., 1.0)
      algorithm.moreau.mu: choice(0.0, 1.0)
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: MULTIRUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra/launcher=slurm_h200fast
    - hydra.mode=MULTIRUN
    task:
    - +sweep=alm_proj
    - data=cifar10
    - task=cifar10_loss
    - approach=opt
    - init_seed=4
  job:
    name: run
    chdir: false
    override_dirname: +sweep=alm_proj,approach=opt,data=cifar10,init_seed=4,task=cifar10_loss
    id: ???
    num: ???
    config_name: config
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: /mnt/personal/kliacand/humancompatible-train/benchmark/new_bench
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /mnt/personal/kliacand/humancompatible-train/benchmark/new_bench/conf
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: ???
    choices:
      sweep: alm_proj
      algorithm: alm_proj
      task: cifar10_loss
      data: cifar10
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: slurm_h200fast
      hydra/output: default
  verbose: false
data:
  name: cifar10
task:
  name: cifar10
  batch_size: 120
  model: conv
  loss: ce
  constraint:
    kind: LossPairwise
    bound: 0.1
    loss: CrossEntropyLoss
algorithm:
  name: alm_proj
  updater: primal_dual
  constraints_to_eq: false
  select_filter: upper
  primal:
    _target_: torch.optim.Adam
    _partial_: true
    lr: 0.01
    weight_decay: 0.01
  moreau:
    mu: 1.0
  dual:
    _target_: humancompatible.train.dual_optim.ALM
    _partial_: true
    lr: 0.01
    penalty: 1.0
    is_ineq: true
n_epochs: 80
verbose: false
approach: opt
opt_eval_size: 10000
init_seed: 4
cv_seed: 0
n_folds: 5
fold: 0
