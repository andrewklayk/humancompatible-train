# @package _global_
# ALM (max / equality form) hyperparameter grid for E1 (manual grid, BASIC sweeper).
# Full cartesian product: 5 * 5 * 3 * 3 = 225 configs. Use with: bash scripts/E1_alm_max.sh
defaults:
  - override /algorithm: alm_max

hydra:
  sweeper:
    params:
      algorithm.primal.lr: choice(0.001, 0.005, 0.01, 0.02, 0.05)
      algorithm.dual.lr: choice(0.001, 0.005, 0.01, 0.02, 0.05)
      algorithm.dual.penalty: choice(0.1, 1.0, 10.0)
      algorithm.moreau.mu: choice(0.0, 1.0, 2.0)
