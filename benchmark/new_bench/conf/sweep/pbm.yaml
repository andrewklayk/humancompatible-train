# @package _global_
# PBM hyperparameter grid for E1 (manual grid, BASIC sweeper).
# Full cartesian product: 5 * 5 * 2 * 2 = 100 configs (lr x penalty_mult x penalty_range x mu;
# pupl / gamma_annealing / penalty_annealing are single-valued here, the rest fixed in
# conf/algorithm/pbm.yaml).
defaults:
  - override /algorithm: pbm

hydra:
  sweeper:
    params:
      algorithm.primal.lr: choice(0.001, 0.005, 0.01, 0.02, 0.05)
      algorithm.dual.penalty_mult: choice(0.1, 0.9, 0.99, 0.999, 1.0)
      algorithm.dual.penalty_range: choice([0.01, 1.])
      algorithm.dual.primal_update_process_length: choice(1)
      algorithm.dual.gamma_annealing: choice(true)
      algorithm.dual.gamma: choice(0.1, 0.9, 0.99)
      algorithm.dual.penalty_annealing: choice(true)
      algorithm.moreau.mu: choice(0.0, 2.0)
