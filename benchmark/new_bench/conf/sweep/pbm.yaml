# @package _global_
# PBM hyperparameter grid for E1 (manual grid, BASIC sweeper).
# Enumerated as a full cartesian product by Hydra's default (basic) sweeper:
# 5 * 5 * 2 * 3 * 2 * 3 = 900 configs. Use with:  bash scripts/E1_pbm.sh
# (penalty_update / pbf / gamma / delta are fixed in conf/algorithm/pbm.yaml.)
defaults:
  - override /algorithm: pbm

hydra:
  sweeper:
    params:
      algorithm.primal.lr: choice(0.001, 0.005, 0.01, 0.02, 0.05)
      algorithm.dual.penalty_mult: choice(0.0, 0.1, 0.5, 0.9, 1.0)
      algorithm.dual.penalty_range: choice([0.1, 1.], [0.01, 1])
      algorithm.dual.primal_update_process_length: choice(1)
      algorithm.dual.gamma_annealing: choice(true)
      algorithm.dual.penalty_annealing: choice(true)
      algorithm.moreau.mu: choice(0.0, 1.0)
