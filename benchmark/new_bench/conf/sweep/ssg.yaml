# @package _global_
# Switching-subgradient (SSG) hyperparameter grid for E1 (manual grid, BASIC sweeper).
# Full cartesian product: 5 * 5 * 2 = 50 configs (lr x dual.lr x mu).
defaults:
  - override /algorithm: ssg

hydra:
  sweeper:
    params:
      algorithm.primal.lr: choice(0.001, 0.005, 0.01, 0.02, 0.05)
      algorithm.dual.lr: choice(0.001, 0.005, 0.01, 0.02, 0.05)
      algorithm.moreau.mu: choice(0.0, 1.0)
