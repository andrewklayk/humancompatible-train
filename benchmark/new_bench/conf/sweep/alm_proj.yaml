# @package _global_
# ALM (projection form) hyperparameter grid for E1 (manual grid, BASIC sweeper).
# Full cartesian product: 5 * 5 * 3 * 3 = 225 configs. Use with: bash scripts/E1_alm_proj.sh
defaults:
  - override /algorithm: alm_proj

hydra:
  sweeper:
    params:
      algorithm.primal.lr: choice(0.001, 0.005, 0.01, 0.02, 0.05)
      algorithm.dual.lr: choice(0.01, 0.02, 0.05, 0.1, 0.5)
      algorithm.dual.penalty: choice(0., 1.0)
      algorithm.moreau.mu: choice(0.0, 1.0)
