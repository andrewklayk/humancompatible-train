# @package _global_
# PBM hyperparameter grid for E1 (manual grid, BASIC sweeper).
# Enumerated as a full cartesian product by Hydra's default (basic) sweeper:
# 5 * 5 * 2 * 3 * 2 * 3 = 900 configs. Use with:  bash scripts/E1_pbm_mirror.sh
# (penalty_update / pbf / gamma / delta are fixed in conf/algorithm/pbm.yaml.)
defaults:
  - override /algorithm: pbm_mirror

hydra:
  sweeper:
    params:
      algorithm.primal.lr: choice(0.001, 0.005, 0.01, 0.02, 0.05)
      algorithm.dual.penalty_mult: choice(0.0, 0.1, 0.5, 0.9, 1.0)
      algorithm.dual.penalty_range: choice([0.1, 1.0], [0.01, 2.0])
      algorithm.dual.primal_update_process_length: choice(1, 2, 3)
      algorithm.moreau.mu: choice(0.0, 2.0)
      algorithm.dual.mirror_ascent_step_size: choice(0.1, 0.5, 0.8)
