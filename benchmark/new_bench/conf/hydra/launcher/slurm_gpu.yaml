# GPU Slurm launcher for multirun, via the hydra-submitit-launcher plugin.
# Requires:  pip install hydra-submitit-launcher
# Use with:  python run.py -m hydra/launcher=slurm_gpu +sweep=pbm \
#                data=cifar10 task=cifar10_loss seed=0,1,2
#
# Same as slurm.yaml but requests a GPU per task. Edit `partition` to your GPU
# partition and adjust resources for your cluster.
defaults:
  - submitit_slurm

# --- resources (edit for your cluster) ---
partition: amdgpufast             # <-- your GPU partition name
# MUST stay 1: submitit runs the job's function ONCE PER TASK. run.py is a single
# process (not torch.distributed), so tasks_per_node>1 launches N duplicate processes
# that share one Hydra output dir and write train.csv/opt.csv concurrently -> torn,
# interleaved CSV rows. To pack many jobs on a node, use array_parallelism, not tasks.
tasks_per_node: 1
cpus_per_task: 4          # dataloading workers / host-side work
mem_per_cpu: 8G

# GPU request. submitit has no first-class `gres` field, so we pass it through
# additional_parameters -> renders as `#SBATCH --gres=gpu:1`. This is the most
# widely-supported form (works on older Slurm / strictly-GRES clusters).
additional_parameters:
  gres: "gpu:1"            # or e.g. "gpu:a100:1" to pin a GPU type
  # account: my_account

# Alternative on newer Slurm (>=19.05 with the --gpus GRES family enabled):
# comment out additional_parameters.gres above and use instead:
# gpus_per_node: 1         # -> `#SBATCH --gpus-per-node=1`

# Caps how many array tasks are active at once -> renders as `#SBATCH --array=0-M%N`.
# Two reasons to set it:
#   1) throttle concurrent GPU use (be a good cluster citizen), and
#   2) stay under the QOS submit limit. If sbatch fails with
#      "QOSMaxSubmitJobPerUserLimit ... job submit limit", your QOS caps how many jobs
#      you may have submitted (pending+running) at once; the `%N` throttle makes Slurm
#      hold the rest so only N count against that limit. Set this <= your limit
#      (find it with:  sacctmgr -n show assoc user=$USER format=QOS,MaxSubmit  or
#       sacctmgr -n show qos format=Name,MaxSubmitJobsPerUser).
# NOTE: this bounds *concurrency*, not the array's total size -- that's the separate
# MaxArraySize (1001 here) constraint documented in scripts/_env.sh.
array_parallelism: 200