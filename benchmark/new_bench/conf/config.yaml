defaults:
  - data: income
  - task: folktables_positive_rate_pair
  - algorithm: pbm
  - _self_

n_epochs: 30
verbose: false

# --- approach: ml (K-fold CV, train/val/test) or opt (full dataset, train only) ---
approach: opt
# Fixed class-balanced subsample size for the end-of-epoch optimality eval on IMAGE
# tasks in opt mode (tabular uses the whole set). Lower it if the full-batch backward
# OOMs; raise it for a tighter KKT estimate.
opt_eval_size: 10000

# --- randomness axes (separated; see README "Cross-validation") ---
init_seed: 0      # model init + batch order (optimization randomness); sweep e.g. 0,1,2
cv_seed: 0        # fixes the stratified test hold-out + K-fold partition (data axis)
n_folds: 5        # K
fold: 0           # which fold is validation; sweep 0,1,2,3,4 for full K-fold CV

hydra:
  job:
    chdir: false
  run:
    dir: outputs/${task.name}/${algorithm.name}/${approach}/fold${fold}_init${init_seed}
  sweep:
    dir: multirun/${task.name}/${algorithm.name}
    # per-config hash (not job.num) so distinct configs never collide and re-runs are
    # idempotent -- see run.py:_hp_hash. job.num restarts per `-m`, which would overwrite.
    subdir: ${approach}/fold${fold}_init${init_seed}/${hp_hash:${algorithm}}
