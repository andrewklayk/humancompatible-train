# conf/burgers.yaml — config for run_burgers.py (Hydra).
# Launch: python3 -u run_burgers.py task.seed=$SLURM_ARRAY_TASK_ID
#
# Grids/threshold/m are hardcoded in the script (fixed, as in the non-PINN
# experiments); this config only carries run-level knobs + the seed.

task: burgers
seed: 0          # overridden by task.seed=$SLURM_ARRAY_TASK_ID

model: deep_narrow
beta: 1.0
lr: 0.001
n_epochs: 100

hydra:
  job:
    chdir: false   # keep cwd = launch dir so results/ lands where you expect
  run:
    dir: .         # don't create outputs/<date> run dirs