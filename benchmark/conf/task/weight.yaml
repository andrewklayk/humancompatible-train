task: weight_norm
batch_size: 80


pbm_params:
  primal__lr: 0.005
  dual__penalty_mult: 0.1
  dual__penalty_update: dimin_adapt #aimd
  dual__penalty_range: [1e-1, 10]
  dual__pbf: quadratic_logarithmic
  dual__gamma: 0.0
  moreau__mu: 2.0

alm_params:
  primal__lr: 0.001
  dual__lr: 0.1
  dual__penalty: 1.
  dual__momentum: 0.
  moreau__mu: 2.0

ssg_params:
  primal__lr: 0.001
  dual__lr: 0.05
  moreau__mu: 2.0

adam_params:
  primal__lr: 0.001
  moreau__mu: 0.0
  # primal__weight_decay: 0.1
  # penalty: 0.1

hydra:
  run:
    dir: .
  job:
    chdir: false
