task: equalized_odds_pairwise

batch_size: 72

# TODO: rework to list (constraints: [(name: ...), (name: ...), ...])
constraint:
  name: FairretPairwise
  bound: 0.1
  statistic: PositiveRate
  kwargs:
    uses_labels: false

pbm_params:
  primal__lr: 0.01
  dual__penalty_mult: 0.1
  dual__penalty_update: dimin_adapt #aimd
  dual__penalty_range: [1e-1, 1.]
  # dual__init_duals: 1e-4
  dual__pbf: quadratic_logarithmic
  dual__gamma: 0.9
  dual__delta: 1.0
  moreau__mu: 2.0


alm_params:
  primal__lr: 0.005
  dual__lr: 0.01
  dual__penalty: 0.0
  dual__momentum: 0.5
  moreau__mu: 2.0

ssg_params:
  primal__lr: 0.001
  dual__lr: 0.001
  moreau__mu: 2.0

adam_params:
  lr: 0.01
  penalty: 0.5

hydra:
  run:
    dir: .
  job:
    chdir: false
